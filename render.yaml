databases:
  - name: dss-postgres
    databaseName: dss
    user: dss_remote
    plan: free

services:
  - type: web
    name: dss-backend
    env: python
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dss-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*" # Change this to your frontend domain later
      - key: GEMINI_API_KEY
        sync: false # You must set this manually in Render Dashboard!
